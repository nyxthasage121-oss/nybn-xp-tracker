name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      bot: ${{ steps.filter.outputs.bot }}
      contract: ${{ steps.filter.outputs.contract }}
      docker_docs: ${{ steps.filter.outputs.docker_docs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
              - '.github/workflows/ci.yml'
            bot:
              - 'apps/bot/**'
              - 'packages/**'
              - '.github/workflows/ci.yml'
            contract:
              - 'packages/api-contract/**'
              - 'packages/rules/**'
              - '.github/workflows/ci.yml'
            docker_docs:
              - 'compose.web.yml'
              - 'compose.full.yml'
              - 'apps/web/docker-compose.yml'
              - 'apps/bot/docker-compose.yml'
              - 'scripts/bootstrap-local.sh'
              - 'scripts/check-docs-parity.sh'
              - 'README.md'
              - 'docs/**'
              - '.github/workflows/ci.yml'

  web-test-and-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python (web)
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/web/requirements.txt

      - name: Install web dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/web/requirements.txt
          pip install ruff

      - name: Lint web (ruff)
        run: ruff check apps/web/app apps/web/tests

      - name: Run web tests
        run: cd apps/web && pytest -q

      - name: Compile web sanity check
        run: python -m compileall apps/web/app apps/web/tests

  bot-test-and-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: detect-changes
    if: needs.detect-changes.outputs.bot == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node (bot)
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/bot/package-lock.json

      - name: Install bot dependencies
        run: cd apps/bot && npm ci

      - name: Run bot checks
        run: cd apps/bot && npm run check

  contract-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: detect-changes
    if: needs.detect-changes.outputs.contract == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate shared JSON files
        run: |
          python -m json.tool packages/api-contract/spend_categories.json >/dev/null
          python -m json.tool packages/rules/xp_costs.json >/dev/null

      - name: Setup Python (contract)
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/web/requirements.txt

      - name: Run web contract test
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/web/requirements.txt
          cd apps/web && pytest -q tests/test_shared_contract.py

      - name: Setup Node (contract)
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/bot/package-lock.json

      - name: Run bot contract test
        run: |
          cd apps/bot
          npm ci
          npm run test -- src/__tests__/sharedContract.test.ts

  docker-and-docs-hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: detect-changes
    if: needs.detect-changes.outputs.docker_docs == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare local env files for compose checks
        run: |
          cp apps/web/.env.example apps/web/.env
          cp apps/bot/.env.example apps/bot/.env
          printf '\nSPREADSHEET_ID=\nFLASK_SECRET_KEY=ci-local-secret\n' >> apps/web/.env

      - name: Validate compose files
        run: |
          docker compose -f compose.web.yml config -q
          docker compose -f compose.full.yml config -q
          docker compose -f apps/web/docker-compose.yml config -q
          docker compose -f apps/bot/docker-compose.yml config -q

      - name: Smoke start local web docker profile
        run: |
          docker compose -f compose.web.yml up -d --build
          for n in {1..30}; do
            if curl -fsS http://127.0.0.1:5001/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Web docker smoke check failed to respond on 127.0.0.1:5001"
          docker compose -f compose.web.yml logs --tail=200
          exit 1

      - name: Docs parity checks
        run: ./scripts/check-docs-parity.sh

      - name: Cleanup smoke containers
        if: always()
        run: docker compose -f compose.web.yml down -v || true

  test-and-lint:
    runs-on: ubuntu-latest
    needs:
      - web-test-and-lint
      - bot-test-and-lint
      - contract-tests
      - docker-and-docs-hygiene
    if: always()
    steps:
      - name: Enforce required-check result
        run: |
          RESULTS="${{ join(needs.*.result, ',') }}"
          echo "Job results: ${RESULTS}"
          if echo "${RESULTS}" | grep -Eq 'failure|cancelled'; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All required jobs passed or were skipped."
