services:
  bot:
    container_name: lasombra-bot
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      NODE_ENV: production
      TZ: ${TZ:-America/Chicago}
    volumes:
      - ./data:/app/data
      - ../../packages:/packages:ro
    logging:
      driver: json-file
      options:
        max-size: "${BOT_LOG_MAX_SIZE:-25m}"
        max-file: "${BOT_LOG_MAX_FILE:-120}"
