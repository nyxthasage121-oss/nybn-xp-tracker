<div class="row g-3">
  <div class="col-md-4">
    <label class="form-label fw-semibold">Label <span class="text-danger">*</span></label>
    <input type="text" name="label" class="form-control" required maxlength="100"
           placeholder="e.g., Posting">
  </div>
  <div class="col-md-4">
    <label class="form-label fw-semibold">Description</label>
    <input type="text" name="description" class="form-control" maxlength="255"
           placeholder="Optional helper text shown to players">
  </div>
  <div class="col-md-1">
    <label class="form-label fw-semibold">XP <span class="text-danger">*</span></label>
    <input type="number" name="xp_value" class="form-control" required min="0" max="99" value="1">
  </div>
  <div class="col-md-2">
    <label class="form-label fw-semibold">Category</label>
    <select name="category" class="form-select">
      <option value="base">base</option>
      <option value="player">player</option>
      <option value="staff">staff</option>
      <option value="helper">helper</option>
    </select>
  </div>
  <div class="col-md-1">
    <label class="form-label fw-semibold">Sort</label>
    <input type="number" name="sort_order" class="form-control" value="0" min="0" max="999">
  </div>
  <div class="col-12 d-flex gap-4">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" name="requires_rp_links"
             id="rpl_{{ crit.criteria_id if crit is defined else 'new' }}" value="1">
      <label class="form-check-label small"
             for="rpl_{{ crit.criteria_id if crit is defined else 'new' }}">Requires RP links</label>
    </div>
    <div class="form-check">
      <input class="form-check-input" type="checkbox" name="requires_text_note"
             id="rtn_{{ crit.criteria_id if crit is defined else 'new' }}" value="1">
      <label class="form-check-label small"
             for="rtn_{{ crit.criteria_id if crit is defined else 'new' }}">Requires text note</label>
    </div>
  </div>
</div>
